server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime DNS — required so nginx re-resolves the backend FQDN when
    # Container Apps recycles pods. NAMESERVER comes from /etc/resolv.conf
    # via docker-entrypoint.sh.
    resolver ${NAMESERVER} valid=15s ipv6=off;
    set $backend_url ${BACKEND_URL};
    set $backend_host ${BACKEND_HOST};

    # Required so the Container Apps Envoy fronting the backend gets the
    # right SNI hostname during the TLS handshake.
    proxy_ssl_server_name on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # ── Proxy /api/* → FastAPI backend ──────────────────────
    location /api/ {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # SSE / streaming friendly
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ── Proxy /af/* → FastAPI backend (agent-framework endpoints) ──
    location /af/ {
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # SSE / streaming friendly
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ── SPA routing — serve index.html for any unknown path ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Container Apps health probe ─────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
